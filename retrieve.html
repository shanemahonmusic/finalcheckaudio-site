<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Retrieve Your Licence — Final Check Audio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #111827;
    }
    .wrap {
      max-width: 560px;
      margin: 80px auto;
      padding: 24px;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.04);
    }
    h1 {
      margin: 0 0 14px;
      font-size: 30px;
      line-height: 1.15;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      color: #374151;
    }
    label {
      display: block;
      margin: 20px 0 8px;
      font-weight: 700;
      color: #111827;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 16px;
    }
    button {
      margin-top: 16px;
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: #4f46e5;
      color: #fff;
    }
    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .msg {
      margin-top: 16px;
      font-size: 15px;
      line-height: 1.5;
    }
    .small {
      margin-top: 18px;
      font-size: 14px;
      color: #6b7280;
    }
    a {
      color: #4f46e5;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Retrieve your licence</h1>
      <p>
        Enter the email address used at checkout and, if we find a licence for it,
        we’ll resend your licence key to that inbox.
      </p>

      <form id="retrieveForm">
        <label for="email">Email address</label>
        <input id="email" name="email" type="email" autocomplete="email" required />
        <button id="submitBtn" type="submit">Resend my licence</button>
      </form>

      <div id="msg" class="msg"></div>

      <p class="small">
        Still stuck? Contact
        <a href="mailto:support@finalcheckaudio.com">support@finalcheckaudio.com</a>
      </p>
    </div>
  </div>

  <script>
    const form = document.getElementById("retrieveForm");
    const msg = document.getElementById("msg");
    const submitBtn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = "";
      submitBtn.disabled = true;
      submitBtn.textContent = "Sending...";

      const email = document.getElementById("email").value.trim();

      try {
        const res = await fetch("https://api.finalcheckaudio.com/v1/retrieve-license", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        msg.textContent =
          data.message || "If we found a licence for that email address, we have sent it to you.";
      } catch (err) {
        msg.textContent = "Something went wrong. Please try again.";
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Resend my licence";
      }
    });
  </script>
</body>
</html>
